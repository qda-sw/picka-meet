services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pickameet}
      POSTGRES_USER: ${POSTGRES_USER:-pickameet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickameet_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pickameet-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-pickameet};Username=${POSTGRES_USER:-pickameet};Password=${POSTGRES_PASSWORD:-pickameet_dev_password}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
